name: build-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Wheel smoke test
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install --upgrade pip
          /tmp/venv/bin/python -m pip install dist/*.whl
          /tmp/venv/bin/fd-cn-gov --help
          /tmp/venv/bin/fd-cn-gov list
          # _cmd_list prints one line per registered source (11 total)
          test "$(/tmp/venv/bin/fd-cn-gov list | wc -l)" -eq 11
