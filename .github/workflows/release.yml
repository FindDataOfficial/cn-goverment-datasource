name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: twine check dist/*
      - name: Wheel smoke test
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install --upgrade pip
          /tmp/venv/bin/python -m pip install dist/*.whl
          /tmp/venv/bin/gov-scraw --help
          /tmp/venv/bin/gov-scraw list
          # _cmd_list prints one line per registered source (11 total)
          test "$(/tmp/venv/bin/gov-scraw list | wc -l)" -eq 11
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
